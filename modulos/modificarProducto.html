<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modificar Producto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    .form-container {
      max-width: 600px;
      margin: 2rem auto;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .form-container h1 {
      margin-bottom: 1.5rem;
      color: #333;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #333;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .btn-submit {
      background: #10b981;
      color: white;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      font-weight: 500;
      transition: background 0.3s;
    }
    .btn-submit:hover {
      background: #059669;
    }
    .btn-submit:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .btn-danger {
      background: #ef4444;
      margin-top: 1rem;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .message {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 6px;
      display: none;
    }
    .message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .loading {
      text-align: center;
      padding: 2rem;
      color: #666;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo-box">
      <img src="../../recursos/logoALMCK.jpeg" width="100" alt="Logo">
    </div>
  </header>

  <main>
    <div class="form-container">
      <h1>✏️ Modificar Producto</h1>
      
      <div id="loading" class="loading">Cargando datos del producto...</div>
      
      <form id="productoForm" style="display: none;">
        <input type="hidden" id="productoId">
        
        <div class="form-group">
          <label for="nombre">Nombre del Producto *</label>
          <input type="text" id="nombre" required>
        </div>

        <div class="form-group">
          <label for="cantidad">Cantidad *</label>
          <input type="number" id="cantidad" min="0" required>
        </div>

        <div class="form-group">
          <label for="tipo">Tipo de Producto *</label>
          <select id="tipo" required>
            <option value="">Seleccione un tipo</option>
            <option value="Ropa niño">👕 Ropa niño</option>
            <option value="Ropa niña">👗 Ropa niña</option>
            <option value="Ropa hombre">👔 Ropa hombre</option>
            <option value="Ropa mujer">💃 Ropa mujer</option>
            <option value="Perfumes">🌸 Perfumes</option>
            <option value="Alimento">🍎 Alimento</option>
            <option value="Reloj">⌚ Reloj</option>
            <option value="Maquillaje">💄 Maquillaje</option>
          </select>
        </div>

        <div class="form-group">
          <label for="precio">Precio *</label>
          <input type="number" id="precio" step="0.01" min="0" required>
        </div>

        <div class="form-group">
          <label for="caducidad">Fecha de Caducidad</label>
          <input type="date" id="caducidad">
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="disponible">
            Producto Disponible
          </label>
        </div>

        <button type="submit" class="btn-submit">Actualizar Producto</button>
        <button type="button" class="btn-submit btn-danger" onclick="eliminarProducto()">
          Eliminar Producto
        </button>
      </form>

      <div id="message" class="message"></div>
    </div>
  </main>

  <footer class="footer">
    <button class="info-pill" onclick="window.location.href='../inventario.html'">
      ← Regresar
    </button>
  </footer>

  <script type="module">
    import { supabase } from '../js/supabaseClient.js';

    // Obtener ID de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const productoId = urlParams.get('id');

    if (!productoId) {
      alert('No se especificó un producto');
      window.location.href = '../inventario.html';
    }

    let productoData = null;

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
      
      setTimeout(() => {
        messageDiv.style.display = 'none';
      }, 3000);
    }

    // Cargar datos del producto
    async function cargarProducto() {
      try {
        const { data, error } = await supabase
          .from('productos')
          .select('*')
          .eq('ProductoID', productoId)
          .single();

        if (error) {
          console.error('Error:', error);
          alert('Error al cargar el producto: ' + error.message);
          window.location.href = '../inventario.html';
          return;
        }

        if (data) {
          productoData = data;
          document.getElementById('productoId').value = data.ProductoID;
          document.getElementById('nombre').value = data.NombreProducto;
          document.getElementById('cantidad').value = data.Cantidad;
          document.getElementById('tipo').value = data.TipoProducto;
          document.getElementById('precio').value = data.Precio;
          document.getElementById('caducidad').value = data.Caducidad || '';
          document.getElementById('disponible').checked = data.Disponible;
          
          document.getElementById('loading').style.display = 'none';
          document.getElementById('productoForm').style.display = 'block';
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error de conexión con la base de datos');
        window.location.href = '../inventario.html';
      }
    }

    // Actualizar producto
    const form = document.getElementById('productoForm');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = parseInt(document.getElementById('productoId').value);
      const nombre = document.getElementById('nombre').value.trim();
      const cantidad = parseInt(document.getElementById('cantidad').value);
      const tipo = document.getElementById('tipo').value;
      const precio = parseFloat(document.getElementById('precio').value);
      const caducidad = document.getElementById('caducidad').value || null;
      const disponible = document.getElementById('disponible').checked;

      // Validaciones
      if (!nombre) {
        showMessage('Por favor ingrese el nombre del producto', 'error');
        return;
      }
      
      if (isNaN(cantidad) || cantidad < 0) {
        showMessage('La cantidad debe ser un número válido mayor o igual a 0', 'error');
        return;
      }

      if (!tipo) {
        showMessage('Por favor seleccione un tipo de producto', 'error');
        return;
      }

      if (isNaN(precio) || precio <= 0) {
        showMessage('El precio debe ser mayor a 0', 'error');
        return;
      }

      const submitBtn = form.querySelector('.btn-submit');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Actualizando...';
      submitBtn.disabled = true;

      try {
        const { error } = await supabase
          .from('productos')
          .update({
            NombreProducto: nombre,
            Cantidad: cantidad,
            TipoProducto: tipo,
            Precio: precio,
            Caducidad: caducidad,
            Disponible: disponible
          })
          .eq('ProductoID', id);

        if (error) {
          showMessage('Error al actualizar: ' + error.message, 'error');
        } else {
          showMessage('✅ Producto actualizado exitosamente', 'success');
          setTimeout(() => {
            window.location.href = '../inventario.html';
          }, 2000);
        }
      } catch (error) {
        showMessage('Error de conexión con la base de datos', 'error');
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });

    // Eliminar producto
    window.eliminarProducto = async function() {
      if (!productoData) return;
      
      if (confirm(`¿Estás seguro de eliminar "${productoData.NombreProducto}" permanentemente?`)) {
        const id = parseInt(document.getElementById('productoId').value);
        
        const { error } = await supabase
          .from('productos')
          .delete()
          .eq('ProductoID', id);

        if (error) {
          showMessage('Error al eliminar: ' + error.message, 'error');
        } else {
          showMessage('✅ Producto eliminado exitosamente', 'success');
          setTimeout(() => {
            window.location.href = '../inventario.html';
          }, 2000);
        }
      }
    };

    // Inicializar
    cargarProducto();
  </script>
</body>
</html>
