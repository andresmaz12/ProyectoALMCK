<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Producto - Sistema ALMCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    .form-container {
      max-width: 600px;
      margin: 2rem auto;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .form-container h1 {
      margin-bottom: 1.5rem;
      color: #333;
      font-family: 'Syne', sans-serif;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #333;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      box-sizing: border-box;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .btn-submit {
      background: #10b981;
      color: white;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      font-weight: 600;
      transition: background 0.3s;
    }
    .btn-submit:hover {
      background: #059669;
    }
    .btn-submit:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .message {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 6px;
      display: none;
      font-weight: 500;
    }
    .message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .loading {
      text-align: center;
      padding: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header class="header" style="text-align: center; padding: 1rem;">
    <div class="logo-box">
      <img src="../../recursos/logoALMCK.jpeg" width="100" alt="Logo">
    </div>
  </header>

  <main>
    <div class="form-container">
      <h1>➕ Agregar Nuevo Producto</h1>
      
      <div id="connectionStatus" class="loading">🔌 Verificando conexión...</div>
      
      <form id="productoForm">
        <div class="form-group">
          <label for="nombre">Nombre del Producto *</label>
          <input type="text" id="nombre" required placeholder="Ej: Camisa de algodón">
        </div>

        <div class="form-group">
          <label for="cantidad">Cantidad *</label>
          <input type="number" id="cantidad" min="0" required placeholder="0">
        </div>

        <div class="form-group">
          <label for="tipo">Tipo de Producto *</label>
          <select id="tipo" required>
            <option value="">Seleccione un tipo</option>
            <option value="1">👔 Ropa hombre</option>
            <option value="2">👗 Ropa mujer</option>
            <option value="3">🌸 Perfume</option>
            <option value="4">🍎 Comida</option>
            <option value="5">⌚ Accesorios</option>
          </select>
        </div>

        <div class="form-group">
          <label for="precio">Precio *</label>
          <input type="number" id="precio" step="0.01" min="0" required placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="caducidad">Fecha de Caducidad</label>
          <input type="date" id="caducidad">
        </div>

        <div class="form-group">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="disponible" checked style="width: auto;">
            Producto Disponible
          </label>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Guardar Producto</button>
      </form>

      <div id="message" class="message"></div>
    </div>
  </main>

  <footer style="text-align: center; margin-top: 2rem; padding-bottom: 2rem;">
    <button onclick="window.location.href='../inventario.html'" style="background: #6b7280; color: white; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer;">
      ← Regresar al Inventario
    </button>
  </footer>

  <script type="module">
    import { supabase, testSupabaseConnection } from '../../supabaseClient.js';

    const form = document.getElementById('productoForm');
    const messageDiv = document.getElementById('message');
    const connectionStatus = document.getElementById('connectionStatus');
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
      
      // No ocultar si es error crítico, para que el usuario pueda leerlo
      if(type === 'success') {
        setTimeout(() => { messageDiv.style.display = 'none'; }, 4000);
      }
    }

    // Verificar conexión al cargar
    async function checkConnection() {
      const isConnected = await testSupabaseConnection();
      if (isConnected) {
        connectionStatus.textContent = '✅ Conectado a Supabase (Esquema: inventario)';
        connectionStatus.style.color = '#10b981';
      } else {
        connectionStatus.textContent = '❌ Error de conexión. Revisa Exposed Schemas.';
        connectionStatus.style.color = '#ef4444';
        submitBtn.disabled = true;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Obtener y limpiar valores
      const nombre = document.getElementById('nombre').value.trim();
      const cantidad = parseInt(document.getElementById('cantidad').value);
      const tipoId = parseInt(document.getElementById('tipo').value);
      const precio = parseFloat(document.getElementById('precio').value);
      const caducidad = document.getElementById('caducidad').value || null;
      const disponible = document.getElementById('disponible').checked;

      // Mostrar estado de carga
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Guardando...';
      submitBtn.disabled = true;

      try {
        // Objeto mapeado EXACTAMENTE a las columnas de tu tabla "inventario.productos"
        const nuevoProducto = {
          nombreProducto: nombre,
          precioProducto: precio,
          cantidadProducto: cantidad,
          TipoProducto: tipoId,
          Disponiblilidad: disponible,
          Caducidad: caducidad
        };

        const { data, error } = await supabase
          .from('productos')
          .insert([nuevoProducto])
          .select();

        if (error) {
          console.error('Error Supabase:', error);
          // Si el error es 405, es por la configuración de Exposed Schemas en el dashboard
          const errorMsg = error.code === '405' ? 'Error 405: El esquema "inventario" no está expuesto en Settings > API' : error.message;
          showMessage('❌ Error: ' + errorMsg, 'error');
        } else {
          showMessage('✅ Producto guardado exitosamente en el inventario', 'success');
          form.reset();
          document.getElementById('disponible').checked = true;
          
          setTimeout(() => {
            window.location.href = '../inventario.html';
          }, 2000);
        }
      } catch (error) {
        console.error('Error inesperado:', error);
        showMessage('❌ Error inesperado de conexión.', 'error');
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });

    checkConnection();
  </script>
</body>
</html>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Inventario</title>
    <link rel="stylesheet" href="estiloInventario.css">
</head>
<body>

    <div class="container">
        <h2>Nuevo Registro</h2>
        <form id="formAgregar" action="#" method="POST">

            <div class="form-group">
                <label for="nombre">Nombre del Producto</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Crema Para la Piel" required>
            </div>

            <div class="form-group">
                <label for="categoria">Categoría</label>
                <select id="categoria" name="categoria">
                    <option value="maquillaje">Maquillaje</option>
                    <option value="pachones">Pachones</option>
                    <option value="ropa">Ropa</option>
                </select>
            </div>

            <div class="form-group">
                <label for="precio">Precio Unitario</label>
                <input type="number" id="precio" name="precio" step="0.01" placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="stock">Cantidad en Stock</label>
                <input type="number" id="stock" name="stock">
            </div>

            <div class="form-group">
                <label for="notas">Notas adicionales</label>
                <textarea id="notas" name="notas" rows="3"></textarea>
            </div>

            <button type="submit">Guardar en Base de Datos</button>
        </form>
    </div>

    <a class="btn-salir" href="../inventario.html">Regresar</a>

    <script src="db.js"></script>
    <script src="permisos.js"></script>
    <script>
        if (!Permisos.puedeAgregar()) {
            Permisos.bloquearAccion('Agregar Producto');
            window.location.href = '../inventario.html';
        }

        document.getElementById('formAgregar').addEventListener('submit', function(e) {
            e.preventDefault();

            const producto = {
                nombre:    document.getElementById('nombre').value,
                categoria: document.getElementById('categoria').value,
                precio:    parseFloat(document.getElementById('precio').value),
                stock:     parseInt(document.getElementById('stock').value, 10),
                notas:     document.getElementById('notas').value,
            };

            DB.agregarProducto(producto).then(res => {
                if (res.ok) {
                    alert('Producto agregado correctamente.');
                    window.location.href = '../inventario.html';
                }
            });
        });
    </script>

</body>
</html>
