<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Inventario</title>
    <link rel="stylesheet" href="estiloInventario.css">
</head>
<body>

    <div class="container">
        <h2>Nuevo Registro</h2>
        <form action="#" method="POST">

            <div class="form-group">
                <label for="nombre">Nombre del Producto</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Crema Para la Piel" required>
            </div>

            <div class="form-group">
                <label for="categoria">Categoría</label>
                <select id="categoria" name="categoria">
                    <option value="carnes">Maquillaje</option>
                    <option value="embutidos">Pachones</option>
                    <option value="lacteos">Ropa</option>
                </select>
            </div>

            <div class="form-group">
                <label for="precio">Precio Unitario</label>
                <input type="number" id="precio" name="precio" step="0.01" placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="stock">Cantidad en Stock</label>
                <input type="number" id="stock" name="stock">
            </div>

            <div class="form-group">
                <label for="notas">Notas adicionales</label>
                <textarea id="notas" name="notas" rows="3"></textarea>
            </div>

            <button type="submit">Guardar en Base de Datos</button>
        </form>
    </div>

    <a class="btn-salir" href="../inventario.html">Salir</a>

</body>
</html>
