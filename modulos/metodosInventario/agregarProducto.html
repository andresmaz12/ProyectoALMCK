<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Inventario</title>
    <link rel="stylesheet" href="estiloInventario.css">
</head>
<body>

    <div class="container">
        <h2>Nuevo Registro</h2>
        <form id="formAgregar" action="#" method="POST">

            <div class="form-group">
                <label for="nombre">Nombre del Producto</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Crema Para la Piel" required>
            </div>

            <div class="form-group">
                <label for="categoria">Categoría</label>
                <select id="categoria" name="categoria">
                    <option value="maquillaje">Maquillaje</option>
                    <option value="pachones">Pachones</option>
                    <option value="ropa">Ropa</option>
                </select>
            </div>

            <div class="form-group">
                <label for="precio">Precio Unitario</label>
                <input type="number" id="precio" name="precio" step="0.01" placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="stock">Cantidad en Stock</label>
                <input type="number" id="stock" name="stock">
            </div>

            <div class="form-group">
                <label for="notas">Notas adicionales</label>
                <textarea id="notas" name="notas" rows="3"></textarea>
            </div>

            <button type="submit">Guardar en Base de Datos</button>
        </form>
    </div>

    <a class="btn-salir" href="../inventario.html">Regresar</a>

    <script src="db.js"></script>
    <script src="permisos.js"></script>
    <script>
        if (!Permisos.puedeAgregar()) {
            Permisos.bloquearAccion('Agregar Producto');
            window.location.href = '../inventario.html';
        }

        document.getElementById('formAgregar').addEventListener('submit', function(e) {
            e.preventDefault();

            const producto = {
                nombre:    document.getElementById('nombre').value,
                categoria: document.getElementById('categoria').value,
                precio:    parseFloat(document.getElementById('precio').value),
                stock:     parseInt(document.getElementById('stock').value, 10),
                notas:     document.getElementById('notas').value,
            };

            DB.agregarProducto(producto).then(res => {
                if (res.ok) {
                    alert('Producto agregado correctamente.');
                    window.location.href = '../inventario.html';
                }
            });
        });
    </script>

</body>
</html>
