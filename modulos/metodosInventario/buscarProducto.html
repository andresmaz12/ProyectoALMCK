<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Producto para Modificar</title>
    <link rel="stylesheet" href="estiloInventario.css">
</head>
<body>

    <div class="main-container">
        <h2>Buscar Producto para Modificar</h2>

        <div class="header-tools">
            <input type="text" id="campoBusqueda" class="search-box"
                   placeholder="Buscar por nombre, categoría o ID...">
            <button class="btn-search" onclick="ejecutarBusqueda()">Buscar</button>
        </div>

        <table id="tablaResultados">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Stock</th>
                    <th>Precio</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                <tr>
                    <td colspan="6" style="text-align:center; color:#6b7280; padding:40px 0;">
                        Escribe un término y presiona "Buscar"
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <a class="btn-salir" href="../inventario.html">Regresar</a>

    <script src="db.js"></script>
    <script src="permisos.js"></script>
    <script>
        const campoBusqueda = document.getElementById('campoBusqueda');
        const cuerpoTabla   = document.getElementById('cuerpoTabla');

        campoBusqueda.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') ejecutarBusqueda();
        });

        function ejecutarBusqueda() {
            const termino = campoBusqueda.value.trim();
            if (!termino) {
                cuerpoTabla.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#6b7280; padding:40px 0;">
                    Escribe un término y presiona "Buscar"</td></tr>`;
                return;
            }

            DB.buscarPorTermino(termino).then(resultados => {
                if (resultados.length === 0) {
                    cuerpoTabla.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#6b7280; padding:40px 0;">
                        No se encontraron productos para "${termino}"</td></tr>`;
                    return;
                }

                cuerpoTabla.innerHTML = resultados.map(p => `
                    <tr>
                        <td>#${p.id}</td>
                        <td>${p.nombre}</td>
                        <td><span class="badge">${p.categoria}</span></td>
                        <td>${p.stock} unidades</td>
                        <td>Q${p.precio.toFixed(2)}</td>
                        <td>
                            <a href="#" class="edit-link"
                               onclick="seleccionarProducto('${p.id}'); return false;">
                                Seleccionar
                            </a>
                        </td>
                    </tr>
                `).join('');
            });
        }

        function seleccionarProducto(id) {
            if (!Permisos.verificarOBloquear(Permisos.NIVELES.MODIFICAR, 'Modificar Producto')) {
                return;
            }
            window.location.href = `modificarProducto.html?id=${id}`;
        }
    </script>

</body>
</html>
